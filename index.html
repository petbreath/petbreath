<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PetBreath — Dinlenme Solunum Takibi</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2230;
  --card:#1e2535;--card2:#242d3f;
  --teal:#00d4a8;--teal2:#00b08c;--teal3:rgba(0,212,168,0.12);
  --coral:#ff6b6b;--amber:#ffb347;
  --text:#e6edf3;--muted:#7d8590;--subtle:#444d5c;
  --border:rgba(255,255,255,0.07);
  --radius:14px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
button{cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}
.app{display:flex;flex-direction:column;min-height:100vh}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--teal);letter-spacing:-0.5px}
.nav-brand span{color:var(--text);font-weight:400}
.nav-right{display:flex;align-items:center;gap:1rem}
.nav-user{font-size:0.85rem;color:var(--muted)}
.nav-badge{background:var(--teal3);color:var(--teal);font-size:0.75rem;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid rgba(0,212,168,0.2)}
.btn-logout{background:transparent;color:var(--muted);font-size:0.85rem;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);transition:all .2s}
.btn-logout:hover{color:var(--coral);border-color:var(--coral)}

/* MAIN */
.main{flex:1;padding:2rem;max-width:1100px;margin:0 auto;width:100%}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 30% 20%,rgba(0,212,168,0.06) 0%,transparent 60%),var(--bg)}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:460px}
.auth-logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--teal);margin-bottom:0.25rem}
.auth-logo span{color:var(--text)}
.auth-tagline{color:var(--muted);font-size:0.9rem;margin-bottom:2rem}
.tab-row{display:flex;gap:0.5rem;margin-bottom:2rem;background:var(--bg2);border-radius:var(--radius-sm);padding:4px}
.tab-btn{flex:1;padding:8px;border-radius:6px;background:transparent;color:var(--muted);font-size:0.9rem;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s}
.tab-btn.active{background:var(--teal);color:#000}
.role-row{display:flex;gap:0.5rem;margin-bottom:1.5rem}
.role-btn{flex:1;padding:10px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-size:0.85rem;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.role-btn.active{background:var(--teal3);border-color:var(--teal);color:var(--teal)}
.role-icon{font-size:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:0.95rem;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--teal)}
.form-group select option{background:var(--bg2)}
.btn-primary{width:100%;background:var(--teal);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;padding:12px;border-radius:var(--radius-sm);transition:all .2s;margin-top:0.5rem}
.btn-primary:hover{background:var(--teal2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.msg-error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--coral);padding:10px 14px;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:1rem}
.msg-ok{background:rgba(0,212,168,0.1);border:1px solid rgba(0,212,168,0.3);color:var(--teal);padding:10px 14px;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:1rem}

/* DASHBOARD GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.dash-full{grid-column:1/-1}
@media(max-width:700px){.dash-grid{grid-template-columns:1fr}.dash-full{grid-column:1}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--teal)}

/* BREATH COUNTER */
.counter-ring{position:relative;width:200px;height:200px;margin:0 auto 1.5rem}
.counter-svg{transform:rotate(-90deg)}
.counter-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.counter-num .num{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--teal);line-height:1}
.counter-num .label{font-size:0.75rem;color:var(--muted);margin-top:4px}
.breath-btn{width:100%;padding:14px;border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;transition:all .2s}
.breath-btn-start{background:var(--teal);color:#000;margin-bottom:0.75rem}
.breath-btn-start:hover{background:var(--teal2)}
.breath-btn-count{background:var(--card2);color:var(--text);border:2px solid var(--teal);font-size:1.1rem;margin-bottom:0.75rem}
.breath-btn-count:hover{background:var(--teal3)}
.breath-btn-count:active{transform:scale(0.97)}
.breath-btn-count:disabled{opacity:0.3;cursor:not-allowed}
.breath-btn-reset{background:transparent;color:var(--muted);border:1px solid var(--border);width:100%;padding:10px;border-radius:var(--radius-sm);font-size:0.9rem}

/* PET SELECT */
.pet-chips{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem}
.pet-chip{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.85rem;color:var(--muted);cursor:pointer;transition:all .2s}
.pet-chip.active{background:var(--teal3);border-color:var(--teal);color:var(--teal)}
.add-pet-form{background:var(--bg2);border-radius:var(--radius-sm);padding:1rem;margin-top:1rem}

/* ALERT */
.alert-box{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.4);border-radius:var(--radius-sm);padding:1rem;margin-top:1rem;display:flex;align-items:center;gap:10px;color:var(--coral);font-size:0.9rem}
.alert-box .icon{font-size:1.5rem;flex-shrink:0}

/* CHART */
.chart-wrap{position:relative;height:220px}

/* HISTORY TABLE */
.hist-table{width:100%;border-collapse:collapse;font-size:0.88rem}
.hist-table th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);text-transform:uppercase;font-size:0.75rem;letter-spacing:0.5px}
.hist-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04)}
.hist-table tr:last-child td{border-bottom:none}
.badge-ok{background:rgba(0,212,168,0.15);color:var(--teal);padding:3px 8px;border-radius:12px;font-size:0.78rem}
.badge-warn{background:rgba(255,107,107,0.15);color:var(--coral);padding:3px 8px;border-radius:12px;font-size:0.78rem}

/* MESSAGES */
.msg-list{display:flex;flex-direction:column;gap:0.75rem;max-height:400px;overflow-y:auto}
.msg-item{background:var(--bg2);border-radius:var(--radius-sm);padding:1rem;border-left:3px solid var(--teal)}
.msg-item.unread{border-left-color:var(--amber)}
.msg-meta{font-size:0.78rem;color:var(--muted);margin-bottom:4px}
.msg-text{font-size:0.9rem;line-height:1.5}
.msg-compose{background:var(--bg2);border-radius:var(--radius-sm);padding:0;overflow:hidden}
.msg-compose textarea{width:100%;background:transparent;border:none;outline:none;padding:1rem;color:var(--text);font-size:0.9rem;resize:none;min-height:80px}
.msg-compose-footer{padding:0.75rem;display:flex;justify-content:flex-end;border-top:1px solid var(--border)}
.btn-send{background:var(--teal);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;padding:8px 20px;border-radius:var(--radius-sm)}

/* ADMIN */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--card2);border-radius:var(--radius-sm);padding:1.25rem;text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--teal)}
.stat-lbl{font-size:0.8rem;color:var(--muted);margin-top:4px}
.admin-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.admin-table th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px}
.admin-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.admin-table tr:hover td{background:rgba(255,255,255,0.02)}
.btn-export{background:var(--teal3);color:var(--teal);border:1px solid rgba(0,212,168,0.3);padding:8px 18px;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:500;display:flex;align-items:center;gap:6px}

/* NAV TABS */
.page-tabs{display:flex;gap:0.5rem;margin-bottom:2rem;background:var(--card);border-radius:var(--radius-sm);padding:5px;width:fit-content}
.page-tab{padding:8px 18px;border-radius:6px;background:transparent;color:var(--muted);font-size:0.9rem;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s}
.page-tab.active{background:var(--teal);color:#000}

/* ANNOUNCE */
.announce-item{background:var(--bg2);border-radius:var(--radius-sm);padding:1.25rem;margin-bottom:0.75rem;border-left:3px solid var(--teal)}
.announce-title{font-family:'Syne',sans-serif;font-weight:700;margin-bottom:6px}
.announce-date{font-size:0.78rem;color:var(--muted);margin-bottom:8px}
.announce-body{font-size:0.9rem;line-height:1.6;color:rgba(230,237,243,0.8)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:0.9rem}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* VET PANEL */
.vet-owner-list{display:flex;flex-direction:column;gap:0.75rem}
.vet-owner-item{background:var(--bg2);border-radius:var(--radius-sm);padding:1rem;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.vet-owner-item:hover{border-color:var(--teal)}
.vet-owner-item.active{border-color:var(--teal);background:var(--teal3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {createClient} = supabase;
const SUPABASE_URL = 'https://stobylohcrzdbkjvxius.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0b2J5bG9oY3J6ZGJranZ4aXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjkxNzQsImV4cCI6MjA5NDAwNTE3NH0.RM5FBA9D7Zrf5Cv6AL0B5jQp8XXT6biZ87rukjK2woY';
const ADMIN_EMAIL = 'admin@petbreath.vet';
const BREATH_LIMIT = 35;

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const {useState, useEffect, useRef, useCallback} = React;

// ─── UTILS ───────────────────────────────────────────────────────────────────
function fmtDate(d){
  return new Date(d).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({onLogin}){
  const [tab,setTab]=useState('login');
  const [role,setRole]=useState('owner');
  const [form,setForm]=useState({email:'',password:'',first_name:'',last_name:'',phone:'',clinic_name:'',vet_id:''});
  const [vets,setVets]=useState([]);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [loading,setLoading]=useState(false);

  useEffect(()=>{sb.from('veterinarians').select('id,first_name,last_name,clinic_name').then(({data})=>setVets(data||[]));},[]);

  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  async function handleSubmit(){
    setErr('');setOk('');setLoading(true);
    try{
      if(tab==='login'){
        const {data,error}=await sb.auth.signInWithPassword({email:form.email,password:form.password});
        if(error) throw error;
        onLogin(data.user);
      } else {
        if(!form.email||!form.password||!form.first_name||!form.last_name||!form.phone) throw new Error('Tüm alanları doldurun');
        if(role==='vet'&&!form.clinic_name) throw new Error('Klinik adı zorunludur');
        const {data,error}=await sb.auth.signUp({email:form.email,password:form.password});
        if(error) throw error;
        const uid=data.user.id;
        if(role==='vet'){
          await sb.from('veterinarians').insert({user_id:uid,first_name:form.first_name,last_name:form.last_name,phone:form.phone,email:form.email,clinic_name:form.clinic_name});
        } else {
          const vetId=form.vet_id||null;
          await sb.from('pet_owners').insert({user_id:uid,first_name:form.first_name,last_name:form.last_name,phone:form.phone,email:form.email,vet_id:vetId});
        }
        setOk('Kayıt başarılı! Giriş yapabilirsiniz.');
        setTab('login');
      }
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">Pet<span>Breath</span></div>
        <div className="auth-tagline">Dinlenme Solunum Takip Sistemi</div>
        <div className="tab-row">
          <button className={`tab-btn ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>Giriş</button>
          <button className={`tab-btn ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>Kayıt</button>
        </div>
        {err&&<div className="msg-error">{err}</div>}
        {ok&&<div className="msg-ok">{ok}</div>}
        {tab==='register'&&(
          <>
            <div className="role-row">
              <button className={`role-btn ${role==='owner'?'active':''}`} onClick={()=>setRole('owner')}>
                <span className="role-icon">🐾</span><span>Hasta Sahibi</span>
              </button>
              <button className={`role-btn ${role==='vet'?'active':''}`} onClick={()=>setRole('vet')}>
                <span className="role-icon">🩺</span><span>Veteriner Hekim</span>
              </button>
            </div>
            <div className="form-row">
              <div className="form-group"><label>Ad</label><input value={form.first_name} onChange={e=>upd('first_name',e.target.value)} placeholder="Ad"/></div>
              <div className="form-group"><label>Soyad</label><input value={form.last_name} onChange={e=>upd('last_name',e.target.value)} placeholder="Soyad"/></div>
            </div>
            <div className="form-group"><label>Telefon</label><input value={form.phone} onChange={e=>upd('phone',e.target.value)} placeholder="05xx xxx xx xx"/></div>
            {role==='vet'&&<div className="form-group"><label>Veteriner Kliniği</label><input value={form.clinic_name} onChange={e=>upd('clinic_name',e.target.value)} placeholder="Klinik adı"/></div>}
            {role==='owner'&&(
              <div className="form-group">
                <label>Veteriner Hekiminiz</label>
                <select value={form.vet_id} onChange={e=>upd('vet_id',e.target.value)}>
                  <option value="">— Hekimim listede yok —</option>
                  {vets.map(v=><option key={v.id} value={v.id}>{v.first_name} {v.last_name} — {v.clinic_name}</option>)}
                </select>
              </div>
            )}
          </>
        )}
        <div className="form-group"><label>E-posta</label><input type="email" value={form.email} onChange={e=>upd('email',e.target.value)} placeholder="ornek@email.com"/></div>
        <div className="form-group"><label>Şifre</label><input type="password" value={form.password} onChange={e=>upd('password',e.target.value)} placeholder="En az 6 karakter"/></div>
        <button className="btn-primary" onClick={handleSubmit} disabled={loading}>{loading?'Lütfen bekleyin...':(tab==='login'?'Giriş Yap':'Kayıt Ol')}</button>
      </div>
    </div>
  );
}

// ─── BREATH COUNTER ───────────────────────────────────────────────────────────
function BreathCounter({pet,ownerId,onSaved}){
  const [phase,setPhase]=useState('idle'); // idle | counting | done
  const [timeLeft,setTimeLeft]=useState(60);
  const [count,setCount]=useState(0);
  const [alert,setAlert]=useState(false);
  const timerRef=useRef(null);

  function startTimer(){
    setPhase('counting');setTimeLeft(60);setCount(0);setAlert(false);
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){clearInterval(timerRef.current);setPhase('done');return 0;}
        return t-1;
      });
    },1000);
  }

  useEffect(()=>{
    if(phase==='done') saveResult();
    return ()=>clearInterval(timerRef.current);
  },[phase]);

  async function saveResult(){
    if(count>BREATH_LIMIT) setAlert(true);
    await sb.from('breath_measurements').insert({pet_id:pet.id,owner_id:ownerId,count});
    if(count>BREATH_LIMIT){
      // Fetch vet email
      const {data:owner}=await sb.from('pet_owners').select('vet_id').eq('id',ownerId).single();
      if(owner?.vet_id){
        const {data:vet}=await sb.from('veterinarians').select('email,first_name,last_name').eq('id',owner.vet_id).single();
        if(vet){
          // Send via EmailJS or just store alert message
          await sb.from('messages').insert({
            owner_id:ownerId,
            pet_id:pet.id,
            recipient_vet_id:owner.vet_id,
            content:`⚠️ UYARI: ${pet.name} adlı hastanın dakikadaki solunum sayısı ${count} olarak ölçüldü. Bu değer normal sınırın (35) üzerindedir. Lütfen kontrol edin.`
          });
        }
      }
    }
    onSaved();
  }

  function reset(){clearInterval(timerRef.current);setPhase('idle');setTimeLeft(60);setCount(0);setAlert(false);}

  const pct=((60-timeLeft)/60)*100;
  const r=80;const circ=2*Math.PI*r;
  const dash=circ*(pct/100);

  return(
    <div>
      <div className="counter-ring">
        <svg className="counter-svg" width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="10"/>
          <circle cx="100" cy="100" r={r} fill="none" stroke={phase==='counting'?'#00d4a8':'#444d5c'} strokeWidth="10"
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .5s'}}/>
        </svg>
        <div className="counter-num">
          <div className="num">{phase==='idle'?'60':timeLeft}</div>
          <div className="label">{phase==='idle'?'saniye':'saniye kaldı'}</div>
        </div>
      </div>
      {phase==='idle'&&<button className="breath-btn breath-btn-start" onClick={startTimer}>▶ Sayımı Başlat</button>}
      {phase==='counting'&&(
        <>
          <button className="breath-btn breath-btn-count" onClick={()=>setCount(c=>c+1)}>
            🫁 Nefes Say &nbsp;<strong style={{fontSize:'1.4rem'}}>{count}</strong>
          </button>
          <div style={{textAlign:'center',color:'var(--muted)',fontSize:'0.85rem',marginBottom:'0.75rem'}}>Her nefes alışta butona basın</div>
        </>
      )}
      {phase==='done'&&(
        <div style={{textAlign:'center',padding:'1rem'}}>
          <div style={{fontFamily:'Syne',fontSize:'2.5rem',fontWeight:800,color:count>BREATH_LIMIT?'var(--coral)':'var(--teal)'}}>{count}</div>
          <div style={{color:'var(--muted)',fontSize:'0.9rem',marginTop:4}}>solunum / dakika</div>
          {count>BREATH_LIMIT&&<div className="alert-box"><span className="icon">⚠️</span><span>Solunum sayısı normalin üzerinde! Veteriner hekiminize bildirim gönderildi.</span></div>}
          {count<=BREATH_LIMIT&&<div style={{color:'var(--teal)',marginTop:'0.75rem',fontSize:'0.9rem'}}>✓ Normal solunum aralığında</div>}
        </div>
      )}
      {phase!=='idle'&&<button className="breath-btn-reset" onClick={reset}>↺ Sıfırla</button>}
    </div>
  );
}

// ─── CHART ────────────────────────────────────────────────────────────────────
function BreathChart({petId}){
  const canvasRef=useRef();
  const chartRef=useRef();
  const [data,setData]=useState([]);

  useEffect(()=>{
    if(!petId) return;
    sb.from('breath_measurements').select('*').eq('pet_id',petId).order('measured_at',{ascending:true}).limit(20)
      .then(({data:d})=>setData(d||[]));
  },[petId]);

  useEffect(()=>{
    if(!canvasRef.current||data.length===0) return;
    if(chartRef.current) chartRef.current.destroy();
    const labels=data.map(d=>new Date(d.measured_at).toLocaleDateString('tr-TR'));
    const counts=data.map(d=>d.count);
    chartRef.current=new Chart(canvasRef.current,{
      type:'line',
      data:{
        labels,
        datasets:[{
          label:'Solunum / dk',
          data:counts,
          borderColor:'#00d4a8',
          backgroundColor:'rgba(0,212,168,0.08)',
          borderWidth:2,
          pointBackgroundColor:counts.map(c=>c>35?'#ff6b6b':'#00d4a8'),
          pointRadius:5,
          tension:0.3,
          fill:true,
        },{
          label:'Limit (35)',
          data:new Array(counts.length).fill(35),
          borderColor:'rgba(255,107,107,0.4)',
          borderDash:[5,5],
          borderWidth:1,
          pointRadius:0,
          fill:false,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#7d8590',font:{size:11}}}},
        scales:{
          x:{ticks:{color:'#7d8590',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},
          y:{ticks:{color:'#7d8590',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'},min:0,suggestedMax:50}
        }
      }
    });
    return ()=>chartRef.current?.destroy();
  },[data]);

  if(data.length===0) return <div style={{textAlign:'center',color:'var(--muted)',padding:'2rem',fontSize:'0.9rem'}}>Henüz ölçüm yok</div>;
  return <div className="chart-wrap"><canvas ref={canvasRef}/></div>;
}

            <div className="card-title"><span className="dot"/>Yayınlanan Duyurular</div>
            {announcements.map(a=>(
              <div key={a.id} className="announce-item" style={{marginBottom:'0.75rem'}}>
                <div className="announce-title" style={{fontSize:'0.95rem'}}>{a.title}</div>
                <div className="announce-date">{fmtDate(a.created_at)}</div>
                <div className="announce-body" style={{fontSize:'0.85rem'}}>{a.content}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [role,setRole]=useState(null); // owner | vet | admin
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session?.user){await detectRole(session.user);setUser(session.user);}
      setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange(async(_,session)=>{
      if(session?.user){await detectRole(session.user);setUser(session.user);}
      else{setUser(null);setRole(null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function detectRole(u){
    if(u.email===ADMIN_EMAIL){setRole('admin');return;}
    const {data:vet}=await sb.from('veterinarians').select('id').eq('user_id',u.id).single();
    if(vet){setRole('vet');return;}
    setRole('owner');
  }

  async function logout(){await sb.auth.signOut();setUser(null);setRole(null);}

  if(loading) return <div className="loading"><span className="spinner"/>Yükleniyor...</div>;
  if(!user) return <AuthScreen onLogin={async(u)=>{await detectRole(u);setUser(u);}}/>;

  const roleTr=role==='admin'?'Admin':role==='vet'?'Veteriner':'Hasta Sahibi';

  return(
    <div className="app">
      <nav className="nav">
        <div className="nav-brand">Pet<span>Breath</span></div>
        <div className="nav-right">
          <span className="nav-user">{user.email}</span>
          <span className="nav-badge">{roleTr}</span>
          <button className="btn-logout" onClick={logout}>Çıkış</button>
        </div>
      </nav>
      <div className="main">
        {role==='owner'&&<OwnerDash user={user}/>}
        {role==='vet'&&<VetDash user={user}/>}
        {role==='admin'&&<AdminDash user={user}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
